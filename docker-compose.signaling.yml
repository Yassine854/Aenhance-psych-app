version: '3.8'
services:
  signaling:
    build:
      context: ./signaling
      dockerfile: Dockerfile
    image: aenhance-signaling:latest
    container_name: aenhance-signaling
    restart: unless-stopped
    environment:
      - SIGNALING_PORT=3001
    ports:
      - "3001:3001"
    networks:
      - aenhance-network

networks:
  aenhance-network:
    driver: bridge
